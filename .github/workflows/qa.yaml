name: Manual qa deployment

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose deployment environment"
        required: true
        type: choice
        options:
          - qa
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'qa' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show target
        run: echo "Deploying to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'qa' }}"

      - name: Simulated deploy
        run: echo "Deploy successful"
