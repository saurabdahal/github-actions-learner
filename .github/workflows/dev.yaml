name: DEV

on:
  push:
    branches:
      - dev-test
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show context
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Simulated lint
        run: echo "lint passed"

      - name: Simulated test
        run: echo "tests passed"
